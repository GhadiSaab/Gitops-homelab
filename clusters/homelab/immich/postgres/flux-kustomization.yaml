apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-postgres
  namespace: flux-system
spec:
  interval: 1h
  path: ./clusters/homelab/immich/postgres
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cloudnative-pg
  targetNamespace: immich
