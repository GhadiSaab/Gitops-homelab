apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring-ns
  labels:
    grafana_datasource: "1"  
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki-gateway.loki.svc.cluster.local:80
        access: proxy
        isDefault: false
