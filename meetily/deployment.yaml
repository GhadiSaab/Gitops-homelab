apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetily-backend
  namespace: meetily
  labels:
    app: meetily-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meetily-backend
  template:
    metadata:
      labels:
        app: meetily-backend
      annotations:
        deploy-time: "2026-05-10T09:00:00Z"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/ghadisaab/meetily-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5167
          env:
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: meetily-secrets
                  key: api-secret-key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meetily-secrets
                  key: gemini-api-key
            - name: DATABASE_PATH
              value: /data/meetings.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meetily-data
