apiVersion: v1
data:
  transcript_processor.py: "from pydantic import BaseModel\nfrom typing import List,
    Tuple, Literal\nfrom pydantic_ai import Agent\nfrom pydantic_ai.models.anthropic
    import AnthropicModel\nfrom pydantic_ai.models.gemini import GeminiModel\nfrom
    pydantic_ai.models.groq import GroqModel\nfrom pydantic_ai.models.openai import
    OpenAIModel\nfrom pydantic_ai.providers.openai import OpenAIProvider\nfrom pydantic_ai.providers.groq
    import GroqProvider\nfrom pydantic_ai.providers.anthropic import AnthropicProvider\n\nimport
    httpx\nimport json as _json\nimport logging\nfrom dotenv import load_dotenv\nfrom
    db import DatabaseManager\n\n\n\n\n\n# Set up logging\nlogging.basicConfig(\n
    \   level=logging.DEBUG,\n    format='%(asctime)s - %(levelname)s - [%(filename)s:%(lineno)d]
    - %(message)s'\n)\nlogger = logging.getLogger(__name__)\n\nload_dotenv()  # Load
    environment variables from .env file\n\ndb = DatabaseManager()\n\nclass Block(BaseModel):\n
    \   \"\"\"Represents a block of content in a section.\n    \n    Block types must
    align with frontend rendering capabilities:\n    - 'text': Plain text content\n
    \   - 'bullet': Bulleted list item\n    - 'heading1': Large section heading\n
    \   - 'heading2': Medium section heading\n    \n    Colors currently supported:\n
    \   - 'gray': Gray text color\n    - '' or any other value: Default text color\n
    \   \"\"\"\n    id: str\n    type: Literal['bullet', 'heading1', 'heading2', 'text']\n
    \   content: str\n    color: str  # Frontend currently only uses 'gray' or default\n\nclass
    Section(BaseModel):\n    \"\"\"Represents a section in the meeting summary\"\"\"\n
    \   title: str\n    blocks: List[Block]\n\nclass MeetingNotes(BaseModel):\n    \"\"\"Represents
    the meeting notes\"\"\"\n    meeting_name: str\n    sections: List[Section]\n\nclass
    People(BaseModel):\n    \"\"\"Represents the people in the meeting. Always have
    this part in the output. Title - Person Name (Role, Details)\"\"\"\n    title:
    str\n    blocks: List[Block]\n\nclass SummaryResponse(BaseModel):\n    \"\"\"Represents
    the meeting summary response based on a section of the transcript\"\"\"\n    MeetingName
    : str\n    People : People\n    SessionSummary : Section\n    CriticalDeadlines:
    Section\n    KeyItemsDecisions: Section\n    ImmediateActionItems: Section\n    NextSteps:
    Section\n    MeetingNotes: MeetingNotes\n\n# --- Main Class Used by main.py ---\n\nclass
    TranscriptProcessor:\n    \"\"\"Handles the processing of meeting transcripts
    using AI models.\"\"\"\n    def __init__(self):\n        \"\"\"Initialize the
    transcript processor.\"\"\"\n        logger.info(\"TranscriptProcessor initialized.\")\n
    \       self.db = DatabaseManager()\n\n    async def process_transcript(self,
    text: str, model: str, model_name: str, chunk_size: int = 5000, overlap: int =
    1000, custom_prompt: str = \"\") -> Tuple[int, List[str]]:\n        \"\"\"\n        Process
    transcript text into chunks and generate structured summaries for each chunk using
    an AI model.\n\n        Args:\n            text: The transcript text.\n            model:
    The AI model provider ('claude', 'gemini', 'groq', 'openai').\n            model_name:
    The specific model name.\n            chunk_size: The size of each text chunk.\n
    \           overlap: The overlap between consecutive chunks.\n            custom_prompt:
    A custom prompt to use for the AI model.\n\n        Returns:\n            A tuple
    containing:\n            - The number of chunks processed.\n            - A list
    of JSON strings, where each string is the summary of a chunk.\n        \"\"\"\n\n
    \       logger.info(f\"Processing transcript (length {len(text)}) with model provider={model},
    model_name={model_name}, chunk_size={chunk_size}, overlap={overlap}\")\n\n        all_json_data
    = []\n        agent = None # Define agent variable\n        llm = None # Define
    llm variable\n\n        try:\n            # Split transcript into chunks (shared
    by all providers)\n            step = chunk_size - overlap\n            if step
    <= 0:\n                logger.warning(f\"Overlap ({overlap}) >= chunk_size ({chunk_size}).
    Adjusting overlap.\")\n                overlap = max(0, chunk_size - 100)\n                step
    = chunk_size - overlap\n\n            chunks = [text[i:i+chunk_size] for i in
    range(0, len(text), step)]\n            num_chunks = len(chunks)\n            logger.info(f\"Split
    transcript into {num_chunks} chunks.\")\n\n            # Gemini: direct REST call
    — response_schema not supported on Gemma models\n            if model == \"gemini\":\n
    \               api_key = await db.get_api_key(\"gemini\")\n                if
    not api_key:\n                    raise ValueError(\"GEMINI_API_KEY not configured\")\n
    \               logger.info(f\"Using Gemini REST (no structured output) for model:
    {model_name}\")\n\n                schema_hint = \"\"\"{\n  \"MeetingName\": \"<string>\",\n
    \ \"People\": {\"title\": \"People\", \"blocks\": [{\"id\":\"<str>\",\"type\":\"bullet\",\"content\":\"<Name
    (Role)>\",\"color\":\"\"}]},\n  \"SessionSummary\": {\"title\": \"Session Summary\",
    \"blocks\": [{\"id\":\"<str>\",\"type\":\"text\",\"content\":\"<str>\",\"color\":\"\"}]},\n
    \ \"CriticalDeadlines\": {\"title\": \"Critical Deadlines\", \"blocks\": []},\n
    \ \"KeyItemsDecisions\": {\"title\": \"Key Items & Decisions\", \"blocks\": [{\"id\":\"<str>\",\"type\":\"bullet\",\"content\":\"<str>\",\"color\":\"\"}]},\n
    \ \"ImmediateActionItems\": {\"title\": \"Immediate Action Items\", \"blocks\":
    [{\"id\":\"<str>\",\"type\":\"bullet\",\"content\":\"<str>\",\"color\":\"\"}]},\n
    \ \"NextSteps\": {\"title\": \"Next Steps\", \"blocks\": [{\"id\":\"<str>\",\"type\":\"bullet\",\"content\":\"<str>\",\"color\":\"\"}]},\n
    \ \"MeetingNotes\": {\"meeting_name\": \"<str>\", \"sections\": [{\"title\":\"<str>\",\"blocks\":[{\"id\":\"<str>\",\"type\":\"text\",\"content\":\"<str>\",\"color\":\"\"}]}]}\n}\"\"\"\n\n
    \               url = f\"https://generativelanguage.googleapis.com/v1beta/models/{model_name}:generateContent?key={api_key}\"\n\n
    \               async with httpx.AsyncClient(timeout=120.0) as client:\n                    for
    i, chunk in enumerate(chunks):\n                        logger.info(f\"Processing
    chunk {i+1}/{num_chunks}...\")\n                        prompt = f\"\"\"Analyze
    this meeting transcript chunk and return ONLY a valid JSON object matching exactly
    this schema. No markdown, no explanation, just the JSON.\n\nSchema:\n{schema_hint}\n\nRules:\n-
    Block \"type\" must be one of: text, bullet, heading1, heading2\n- Block \"color\":
    use \"gray\" for low-importance items, \"\" for default\n- Block \"id\": unique
    string like \"b1\", \"b2\", etc.\n- If a section has no relevant content, use
    an empty blocks list\n\nAdditional context: {custom_prompt}\n\nTranscript:\n---\n{chunk}\n---\n\nReturn
    only the JSON object:\"\"\"\n\n                        try:\n                            resp
    = await client.post(url, json={\n                                \"contents\":
    [{\"parts\": [{\"text\": prompt}]}],\n                                \"generationConfig\":
    {\"temperature\": 0.1}\n                            })\n                            resp.raise_for_status()\n
    \                           data = resp.json()\n                            raw_text
    = \"\"\n                            for part in data.get(\"candidates\", [{}])[0].get(\"content\",
    {}).get(\"parts\", []):\n                                if not part.get(\"thought\"):\n
    \                                   raw_text += part.get(\"text\", \"\")\n\n                            #
    Strip markdown code fences if present\n                            raw_text =
    raw_text.strip()\n                            if raw_text.startswith(\"```\"):\n
    \                               raw_text = raw_text.split(\"```\")[1]\n                                if
    raw_text.startswith(\"json\"):\n                                    raw_text =
    raw_text[4:]\n                                raw_text = raw_text.strip()\n\n
    \                           parsed = _json.loads(raw_text)\n                            #
    Validate it has the expected top-level keys\n                            SummaryResponse(**parsed)\n
    \                           all_json_data.append(_json.dumps(parsed))\n                            logger.info(f\"Successfully
    generated summary for chunk {i+1}.\")\n                        except Exception
    as chunk_error:\n                            logger.error(f\"Error processing
    chunk {i+1}: {chunk_error}\", exc_info=True)\n\n                logger.info(f\"Finished
    processing all {num_chunks} chunks.\")\n                return num_chunks, all_json_data\n\n
    \           # All other providers use pydantic-ai\n            if model == \"claude\":\n
    \               api_key = await db.get_api_key(\"claude\")\n                if
    not api_key: raise ValueError(\"ANTHROPIC_API_KEY environment variable not set\")\n
    \               llm = AnthropicModel(model_name, provider=AnthropicProvider(api_key=api_key))\n
    \               logger.info(f\"Using Claude model: {model_name}\")\n            elif
    model == \"groq\":\n                api_key = await db.get_api_key(\"groq\")\n
    \               if not api_key: raise ValueError(\"GROQ_API_KEY environment variable
    not set\")\n                llm = GroqModel(model_name, provider=GroqProvider(api_key=api_key))\n
    \               logger.info(f\"Using Groq model: {model_name}\")\n            elif
    model == \"openai\":\n                api_key = await db.get_api_key(\"openai\")\n
    \               if not api_key: raise ValueError(\"OPENAI_API_KEY environment
    variable not set\")\n                llm = OpenAIModel(model_name, provider=OpenAIProvider(api_key=api_key))\n
    \               logger.info(f\"Using OpenAI model: {model_name}\")\n            else:\n
    \               logger.error(f\"Unsupported model provider requested: {model}\")\n
    \               raise ValueError(f\"Unsupported model provider: {model}\")\n\n
    \           agent = Agent(llm, result_type=SummaryResponse, result_retries=2)\n
    \           logger.info(\"Pydantic-AI Agent initialized.\")\n\n            for
    i, chunk in enumerate(chunks):\n                logger.info(f\"Processing chunk
    {i+1}/{num_chunks}...\")\n                try:\n                    summary_result
    = await agent.run(\n                        f\"\"\"Given the following meeting
    transcript chunk, extract the relevant information according to the required JSON
    structure. If a specific section (like Critical Deadlines) has no relevant information
    in this chunk, return an empty list for its 'blocks'. Ensure the output is only
    the JSON data.\n\n                        IMPORTANT: Block types must be one of:
    'text', 'bullet', 'heading1', 'heading2'\n                        - Use 'text'
    for regular paragraphs\n                        - Use 'bullet' for list items\n
    \                       - Use 'heading1' for major headings\n                        -
    Use 'heading2' for subheadings\n\n                        For the color field,
    use 'gray' for less important content or '' (empty string) for default.\n\n                        Transcript
    Chunk:\n                        ---\n                        {chunk}\n                        ---\n\n
    \                       Please capture all relevant action items. Transcription
    can have spelling mistakes. correct it if required. context is important.\n\n
    \                       While generating the summary, please add the following
    context:\n                        ---\n                        {custom_prompt}\n
    \                       ---\n                        Make sure the output is only
    the JSON data.\n                        \"\"\",\n                    )\n\n                    if
    hasattr(summary_result, 'data') and isinstance(summary_result.data, SummaryResponse):\n
    \                       final_summary_pydantic = summary_result.data\n                    elif
    isinstance(summary_result, SummaryResponse):\n                        final_summary_pydantic
    = summary_result\n                    else:\n                        logger.error(f\"Unexpected
    result type from agent for chunk {i+1}: {type(summary_result)}\")\n                        continue\n\n
    \                   chunk_summary_json = final_summary_pydantic.model_dump_json()\n
    \                   all_json_data.append(chunk_summary_json)\n                    logger.info(f\"Successfully
    generated summary for chunk {i+1}.\")\n\n                except Exception as chunk_error:\n
    \                   logger.error(f\"Error processing chunk {i+1}: {chunk_error}\",
    exc_info=True)\n\n            logger.info(f\"Finished processing all {num_chunks}
    chunks.\")\n            return num_chunks, all_json_data\n\n        except Exception
    as e:\n            logger.error(f\"Error during transcript processing: {str(e)}\",
    exc_info=True)\n            raise\n\n    def cleanup(self):\n        \"\"\"Clean
    up resources used by the TranscriptProcessor.\"\"\"\n        logger.info(\"Cleaning
    up TranscriptProcessor resources\")\n        try:\n            # Close database
    connections if any\n            if hasattr(self, 'db') and self.db is not None:\n
    \               # self.db.close()\n                logger.info(\"Database connection
    cleanup (using context managers)\")\n        except Exception as e:\n            logger.error(f\"Error
    during TranscriptProcessor cleanup: {str(e)}\", exc_info=True)\n\n        \n"
kind: ConfigMap
metadata:
  name: meetily-transcript-processor
  namespace: meetily
