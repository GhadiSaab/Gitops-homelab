apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      websecureext:
        port: 16384
        expose:
          default: true
        exposedPort: 16384
        protocol: TCP
        tls:
          enabled: true
